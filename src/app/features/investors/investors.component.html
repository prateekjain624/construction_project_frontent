<div class="p-4 md:p-6">
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
    <h1 class="text-2xl md:text-3xl font-bold">Investors</h1>
    <button (click)="openForm()" [disabled]="!selectedProjectId"
            class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded transition disabled:opacity-50">
      + Add Investor
    </button>
  </div>

  <app-project-selector (projectSelected)="onProjectSelected($event)"></app-project-selector>

  @if (selectedProjectId) {
    <div class="bg-white rounded-lg shadow overflow-x-auto">
    <table class="w-full text-sm md:text-base">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-3 md:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
          <th class="px-3 md:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Amount</th>
          <th class="px-3 md:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase hidden sm:table-cell">Date</th>
          <th class="px-3 md:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y">
        @for (investor of investors(); track investor._id) {
          <tr>
            <td class="px-3 md:px-6 py-4">{{ investor.name }}</td>
            <td class="px-3 md:px-6 py-4">₹{{ investor.amount | number }}</td>
            <td class="px-3 md:px-6 py-4 hidden sm:table-cell">{{ investor.date | date }}</td>
            <td class="px-3 md:px-6 py-4">
              <button (click)="openForm(investor)" class="text-blue-600 hover:underline mr-2 text-xs md:text-sm">Edit</button>
              <button (click)="deleteInvestor(investor._id!)" class="text-red-600 hover:underline text-xs md:text-sm">Delete</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
    </div>
  }

  <!-- Modal Form -->
  @if (showForm()) {
    <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-lg p-6 w-full max-w-md">
      <h2 class="text-xl font-bold mb-4">{{ editingInvestor() ? 'Edit' : 'Add' }} Investor</h2>
      <form (ngSubmit)="submit()">
        <div class="mb-4">
          <label class="block text-gray-700 mb-2">Name</label>
          <input [(ngModel)]="formData.name" name="name" required
                 class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="mb-4">
          <label class="block text-gray-700 mb-2">Amount</label>
          <input [(ngModel)]="formData.amount" name="amount" type="number" required
                 class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="mb-4">
          <label class="block text-gray-700 mb-2">Date</label>
          <input [(ngModel)]="formData.date" name="date" type="date" required
                 class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="flex gap-2">
          <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded">
            Save
          </button>
          <button type="button" (click)="closeForm()" 
                  class="flex-1 bg-gray-300 hover:bg-gray-400 py-2 rounded">
            Cancel
          </button>
        </div>
      </form>
    </div>
    </div>
  }
</div>
